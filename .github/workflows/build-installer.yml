name: Build Windows installer

# Build & release matrix:
#   - Tag push (v*)        → "stable" Release, version = tag w/o v prefix
#   - Push to main         → "continuous" Release (prerelease), version =
#                             <YYYY.MM.DD>.<github.run_number>, tag = build-<n>
#   - workflow_dispatch    → no Release, just a 30-day Artifact (testing)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for the installer (e.g. 2.0.0.test)"
        default: "0.0.0.dev"
        required: false

# softprops/action-gh-release needs contents:write to create the tag + Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version string
        id: ver
        shell: pwsh
        run: |
          # Three modes:
          #   tag push v*     → strip 'v', produces e.g. 2.0.0
          #   push to main    → CalVer + run number, e.g. 2026.05.09.42
          #   workflow_dispatch → use input (default 0.0.0.dev)
          $isTag = $env:GITHUB_REF.StartsWith("refs/tags/v")
          $isMain = ("${{ github.event_name }}" -eq "push") -and ($env:GITHUB_REF -eq "refs/heads/main")
          if ($isTag) {
            $v = $env:GITHUB_REF.Substring("refs/tags/v".Length)
            $kind = "stable"
          } elseif ($isMain) {
            $date = (Get-Date -Format "yyyy.MM.dd")
            $v = "$date.${{ github.run_number }}"
            $kind = "continuous"
          } else {
            $v = "${{ inputs.version }}"
            $kind = "manual"
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "kind=$kind" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $v (kind=$kind)"

      - name: Set up bundled Python (full distribution, not embed-zip)
        # The full distribution lets us ship a working pip + a no-surprises
        # site-packages. embed-zip is smaller but breaks several stdlib
        # imports — see build/README.md for rationale.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate the system Python install dir
        id: pyloc
        shell: pwsh
        run: |
          # `setup-python` places Python under hostedtoolcache; we want the
          # full directory tree, not just the wrapper, so robocopy can clone it.
          $pyDir = (Get-Command python).Source | Split-Path -Parent
          echo "dir=$pyDir" >> $env:GITHUB_OUTPUT
          echo "Python install dir: $pyDir"

      - name: Stage Python runtime into build/Python/
        shell: pwsh
        run: |
          $src = "${{ steps.pyloc.outputs.dir }}"
          $dst = "build\Python"
          # /E recurse, /XD exclude dirs, /NFL/NDL/NP minimal output
          robocopy $src $dst /E /XD __pycache__ Doc /NFL /NDL /NP
          # robocopy returns 0–7 for success codes — anything ≥ 8 is a failure.
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          $LASTEXITCODE = 0
          # Sanity check
          if (-not (Test-Path "$dst\python.exe")) {
            Write-Error "Failed to stage Python runtime"
            exit 1
          }

      - name: Pre-install dependencies into build/Python/Lib/site-packages
        shell: pwsh
        run: |
          # This is the bit that makes the installer self-contained: deps
          # land inside the bundled Python so user installs don't need pip /
          # network / SSL trust.
          & "build\Python\python.exe" -m pip install --upgrade pip --no-warn-script-location
          & "build\Python\python.exe" -m pip install -r requirements.txt --no-warn-script-location
          # Verify the most-imported runtime modules actually load
          & "build\Python\python.exe" -c "import fastapi, uvicorn, httpx, p115client, lxml, bs4; print('deps OK')"

      - name: Verify committed nssm.exe
        # We commit nssm.exe under build/nssm.exe so neither local builds
        # nor CI need to re-fetch it. SHA matches the binary used by
        # windows-moviepilot (which has been in production for ~1 year).
        shell: pwsh
        run: |
          $expected = "f689ee9af94b00e9e3f0bb072b34caaf207f32dcb4f5782fc9ca351df9a06c97"
          $actual = (Get-FileHash build\nssm.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) {
            Write-Error "nssm.exe SHA mismatch. expected=$expected actual=$actual"
            exit 1
          }
          Write-Host "nssm.exe SHA OK"

      - name: Locate Inno Setup
        # windows-latest ships Inno Setup 6.x preinstalled (verified
        # 2026-05-08: 6.7.1 on windows-2025 image). We just need to find
        # ISCC.exe across the version-suffixed path. If the runner image
        # ever stops shipping it, swap to:
        #   choco install innosetup --no-progress -y
        # (NB: --version pin breaks if the preinstalled version is newer.)
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Error "Inno Setup not found in standard paths: $($candidates -join ', ')"
            exit 1
          }
          Write-Host "Using ISCC at: $iscc"
          # Show version for the build log
          & $iscc /? 2>&1 | Select-Object -First 1
          echo "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Compile installer
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          cd build
          & "$env:ISCC" "/DMyAppVersion=$version" build.iss
          if (-not (Test-Path "exe\mp-relay-Setup-$version.exe")) {
            Write-Error "Inno Setup did not produce the expected .exe"
            exit 1
          }
          Get-Item "exe\mp-relay-Setup-$version.exe" | Format-List FullName, Length

      - name: Upload artifact (always — useful for workflow_dispatch builds)
        uses: actions/upload-artifact@v4
        with:
          name: mp-relay-installer-${{ steps.ver.outputs.version }}
          path: build/exe/mp-relay-Setup-*.exe
          retention-days: 30

      - name: Attach to GitHub Release — stable (tag pushes)
        if: steps.ver.outputs.kind == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          files: build/exe/mp-relay-Setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Publish continuous-build Release (main pushes)
        if: steps.ver.outputs.kind == 'continuous'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Continuous build ${{ steps.ver.outputs.version }}"
          prerelease: true
          files: build/exe/mp-relay-Setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Auto-built from `${{ github.sha }}` on push to `main`.

            For stable releases, push a tag matching `v*` (e.g. `v1.0.0`).
            This is a rolling continuous build (prerelease).
