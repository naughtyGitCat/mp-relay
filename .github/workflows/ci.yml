name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # p115client (hard dep) requires Python >=3.12, so 3.11 cannot install
        # requirements.txt. We bundle Python 3.12 in the Windows installer, so
        # 3.11 is not a supported runtime anyway.
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Syntax check (compileall)
        run: python -m compileall -q app tests

      - name: Lint (ruff — non-blocking)
        run: ruff check app tests || true

      - name: Run tests
        run: pytest -q tests
